{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg border-0 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="fw-bold">
                    Edit Expense
                </h2>

                <a href="/dashboard" class="btn btn-dark">

                    Back

                </a>

            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Expense Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        value="{{ expense.title }}"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Amount
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="amount"
                        value="{{ expense.amount }}"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Category
                    </label>

                    <select
                        name="category"
                        class="form-select"
                        required
                    >

                        <option {% if expense.category == 'Food' %}selected{% endif %}>
                            Food
                        </option>

                        <option {% if expense.category == 'Travel' %}selected{% endif %}>
                            Travel
                        </option>

                        <option {% if expense.category == 'Shopping' %}selected{% endif %}>
                            Shopping
                        </option>

                        <option {% if expense.category == 'Bills' %}selected{% endif %}>
                            Bills
                        </option>

                        <option {% if expense.category == 'Education' %}selected{% endif %}>
                            Education
                        </option>

                        <option {% if expense.category == 'Entertainment' %}selected{% endif %}>
                            Entertainment
                        </option>

                        <option {% if expense.category == 'Health' %}selected{% endif %}>
                            Health
                        </option>

                        <option {% if expense.category == 'Other' %}selected{% endif %}>
                            Other
                        </option>

                    </select>

                </div>

                <button class="btn btn-warning w-100 py-2">

                    Update Expense

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
