{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg border-0 p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="fw-bold">
                    Add Expense
                </h2>

                <a href="/dashboard" class="btn btn-dark">

                    Back

                </a>

            </div>

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Expense Title
                    </label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        placeholder="Enter expense title"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Amount
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="amount"
                        class="form-control"
                        placeholder="Enter amount"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Category
                    </label>

                    <select
                        name="category"
                        class="form-select"
                        required
                    >

                        <option value="">
                            Select Category
                        </option>

                        <option>
                            Food
                        </option>

                        <option>
                            Travel
                        </option>

                        <option>
                            Shopping
                        </option>

                        <option>
                            Bills
                        </option>

                        <option>
                            Education
                        </option>

                        <option>
                            Entertainment
                        </option>

                        <option>
                            Health
                        </option>

                        <option>
                            Other
                        </option>

                    </select>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Upload Receipt
                    </label>

                    <input
                        type="file"
                        name="receipt"
                        class="form-control"
                    >

                </div>

                <button class="btn btn-success w-100 py-2">

                    Add Expense

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
